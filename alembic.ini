# alembic.ini — configuración principal de Alembic
[alembic]
# ruta donde viven los scripts de migración
script_location = alembic

# URL de conexión a tu PostgreSQL
# debe coincidir exactamente con DATABASE_URL en database.py
sqlalchemy.url = postgresql://postgres:termine6@localhost:5432/iris_db

# formato del nombre de los archivos de migración
file_template = %%(rev)s_%%(slug)s

# directorio donde Alembic guarda archivos temporales
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S